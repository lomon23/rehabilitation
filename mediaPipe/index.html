<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squat AI - Local Test</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: monospace; overflow: hidden; }
        #webcam { display: none; } /* Приховуємо сире відео, показуємо тільки canvas */
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: contain; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 24px; }
        .box { background: rgba(0, 0, 0, 0.7); padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; z-index: 20; color: #ffcc00; }
        
        .highlight { color: #8AA500; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">Запуск камери...</div>
    
    <div id="ui" style="display: none;">
        <div class="box">Повторів: <span id="reps" class="highlight">0</span></div>
        <div class="box">Кут: <span id="angle" class="highlight">0°</span></div>
        <div class="box" style="font-size: 16px; color: #888;">Статус: <span id="stage">STANDING</span></div>
    </div>
    
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output"></canvas>

    <script type="module" src="/main.ts"></script>
</body>
</html>
