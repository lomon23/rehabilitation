<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Squat AI Test</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #webcam { display: none; } /* Ми малюємо відео на canvas */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: #8AA500; font-size: 28px; z-index: 10; font-weight: bold; text-shadow: 1px 1px 2px black; }
        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; z-index: 20; }
        
        .box { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="status">Запуск камери...</div>
    
    <div id="ui" style="display: none;">
        <div class="box">Повторів: <span id="reps">0</span></div>
        <div class="box" id="angle">Кут: 0°</div>
    </div>
    
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output"></canvas>

    <script type="module">
        import { PoseLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision";

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        
        const ui = document.getElementById('ui');
        const statusEl = document.getElementById('status');
        const repsEl = document.getElementById('reps');
        const angleEl = document.getElementById('angle');

        let reps = 0;
        let stage = 'STANDING';
        let poseLandmarker;

        // 1. Спочатку просто вмикаємо камеру
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720, facingMode: "user" } 
                });
                video.srcObject = stream;
                
                // Чекаємо, поки відео реально почне грати
                video.onplaying = () => {
                    statusEl.innerText = "Завантаження ШІ...";
                    initMediaPipe(); // Тільки тепер вантажимо ШІ
                };
            } catch (err) {
                statusEl.innerText = "Помилка камери: " + err.message;
                statusEl.style.color = "red";
            }
        }

        // 2. Ініціалізуємо MediaPipe
        async function initMediaPipe() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
                poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task` },
                    runningMode: "VIDEO"
                });
                
                // Все готово, ховаємо статус, показуємо UI і запускаємо цикл
                statusEl.style.display = "none";
                ui.style.display = "block";
                render();
                
            } catch (err) {
                statusEl.innerText = "Помилка ШІ: " + err.message;
                statusEl.style.color = "red";
            }
        }

        // 3. Математика
        function getAngle(a, b, c) {
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            return angle > 180 ? 360 - angle : angle;
        }

        // 4. Головний цикл відмальовки
        async function render() {
            if (video.videoWidth === 0) {
                requestAnimationFrame(render);
                return;
            }

            // Малюємо відео на canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Шукаємо скелет
            if (poseLandmarker) {
                const results = poseLandmarker.detectForVideo(video, performance.now());
                
                if (results.landmarks && results.landmarks[0]) {
                    const lms = results.landmarks[0];
                    const angle = getAngle(lms[24], lms[26], lms[28]); // Стегно, Коліно, Щиколотка (Права)
                    
                    angleEl.innerText = `Кут: ${Math.round(angle)}°`;

                    // Автомат станів
                    const isSquatting = angle < 95;
                    
                    if (stage === 'STANDING' && angle < 120) {
                        stage = 'DESCENDING';
                    }
                    if (stage === 'DESCENDING' && isSquatting) {
                        stage = 'SQUATTING';
                    }
                    if (stage === 'SQUATTING' && angle > 120) {
                        stage = 'STANDING';
                        reps++;
                        repsEl.innerText = reps;
                    }

                    // Малюємо лінію
                    ctx.strokeStyle = isSquatting ? "#007AFF" : "#8AA500";
                    ctx.lineWidth = 12;
                    ctx.lineCap = "round";
                    ctx.lineJoin = "round";
                    
                    ctx.beginPath();
                    ctx.moveTo(lms[24].x * canvas.width, lms[24].y * canvas.height);
                    ctx.lineTo(lms[26].x * canvas.width, lms[26].y * canvas.height);
                    ctx.lineTo(lms[28].x * canvas.width, lms[28].y * canvas.height);
                    ctx.stroke();
                }
            }
            
            requestAnimationFrame(render);
        }

        // Запускаємо весь процес
        startCamera();
    </script>
</body>
</html>
